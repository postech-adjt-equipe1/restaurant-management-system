spring:
  application:
    name: restaurante-usuarios

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:restaurante_db}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

server:
  port: ${SERVER_PORT:8080}

jwt:
  secret: ${JWT_SECRET:3c7a9f2e1b6d4a8c0e5f3b7d9a2c4e6f8b0d2f4a6c8e0b2d4f6a8c0e2b4d6f8}
  expiration: ${JWT_EXPIRATION:86400000}
